name: Python Dependency Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "30 12 * * 1"

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install pinned audit tooling
        run: python -m pip install pip-audit==2.9.0 pip-tools==7.5.3
      - name: Verify lock file matches requirements and constraints
        run: |
          python -m piptools compile \
            --constraint=python/constraints.txt \
            --generate-hashes \
            --output-file=/tmp/requirements.lock.txt \
            --quiet \
            python/requirements.txt
          grep -v '^#' python/requirements.lock.txt > /tmp/committed.lock
          grep -v '^#' /tmp/requirements.lock.txt > /tmp/generated.lock
          diff -u /tmp/committed.lock /tmp/generated.lock
      - name: Audit locked Python dependencies
        run: python -m pip_audit --requirement python/requirements.lock.txt --no-deps --disable-pip
