name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run Gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks version
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            ./gitleaks detect --source . --log-opts="${BASE_SHA}..${HEAD_SHA}" --verbose --redact
          elif [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            ./gitleaks detect --source . --log-opts="${BEFORE_SHA}..${HEAD_COMMIT}" --verbose --redact
          else
            ./gitleaks detect --source . --no-git --verbose --redact
          fi
