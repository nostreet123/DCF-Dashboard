name: Damodaran Weekly Sync
on:
  schedule:
    - cron: '0 12 * * 0' # Weekly on Sunday at 12:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CONVEX_URL: ${{ secrets.CONVEX_URL }}
      DAMODARAN_SYNC_TOKEN: ${{ secrets.DAMODARAN_SYNC_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
      - name: Run sync
        working-directory: python
        run: |
          # python/ is the working dir, so damodaran_sync is a top-level package here.
          python -m damodaran_sync.cli sync-current
      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const workflow = context.workflow;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `Damodaran sync failed: ${workflow}`;
            const body = [
              `Workflow: ${workflow}`,
              `Run: ${runUrl}`,
              `Job: ${context.job}`,
              "Failure detected in scheduled sync."
            ].join("\n");
            await github.rest.issues.create({ owner, repo, title, body });
