name: Damodaran Weekly Sync
on:
  schedule:
    - cron: '0 12 * * 0' # Weekly on Sunday at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r python/requirements.lock.txt
      - name: Run sync
        working-directory: python
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          DAMODARAN_SYNC_TOKEN: ${{ secrets.DAMODARAN_SYNC_TOKEN }}
        run: |
          missing=()
          [ -z "${CONVEX_URL:-}" ] && missing+=("CONVEX_URL")
          [ -z "${DAMODARAN_SYNC_TOKEN:-}" ] && missing+=("DAMODARAN_SYNC_TOKEN")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi
          # python/ is the working dir, so damodaran_sync is a top-level package here.
          python -m damodaran_sync.cli sync-current --additive-only
      - name: Notify failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const workflow = context.workflow;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `Damodaran sync failed: ${workflow}`;
            const body = [
              `Workflow: ${workflow}`,
              `Run: ${runUrl}`,
              `Job: ${context.job}`,
              "Failure detected in scheduled sync."
            ].join("\n");
            await github.rest.issues.create({ owner, repo, title, body });
