name: CI
on: [pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
      - name: Run tests
        # Run from root, but pointing to python/tests.
        # Ensure python/ is in python path or install as editable if needed.
        # Given requirements.txt layout, simple run is:
        working-directory: python
        run: |
            # We run from python directory so that 'damodaran_sync' is discoverable as a package
            # (assuming python/damodaran_sync exists)
            export PYTHONPATH=$PYTHONPATH:.
            pytest -q tests

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Set up Bun (test runner)
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
