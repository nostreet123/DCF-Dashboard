name: CI
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    # GitHub's dependency-review action requires extra repository features on private repos.
    # Keep it active by default for public repos, and allow opt-in on private repos via Actions vars.
    if: ${{ !github.event.repository.private || vars.ENABLE_GITHUB_DEPENDENCY_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@56339e523c0409420f6c2c9a2f4292bbb3c07dd3 # v4.8.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime,development,unknown

  js-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Verify npm registry signatures
        run: npm audit signatures

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements-dev.txt -c python/constraints.txt
      - name: Run tests
        # Run from root, but pointing to python/tests.
        # Ensure python/ is in python path or install as editable if needed.
        # Given requirements.txt layout, simple run is:
        working-directory: python
        run: |
            # We run from python directory so that 'damodaran_sync' is discoverable as a package
            # (assuming python/damodaran_sync exists)
            export PYTHONPATH=$PYTHONPATH:.
            pytest -q tests

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Set up Bun (test runner)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.10'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
