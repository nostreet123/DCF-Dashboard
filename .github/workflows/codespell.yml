name: Codespell

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install codespell
        run: pip install codespell==2.4.2
      - name: Run codespell
        # Skip binary/generated files and hidden dirs
        run: codespell --skip="./.git,./.venv,./node_modules,./.cache,./package-lock.json"
