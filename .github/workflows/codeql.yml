name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly scan on main for drift between PRs.
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Fork PRs use the same least-privilege token; no repository secrets are required.
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: CodeQL unavailable
        if: ${{ github.event.repository.private && vars.ENABLE_GITHUB_CODE_SCANNING != 'true' }}
        run: |
          echo "CodeQL upload is disabled for this private repository."
          echo "Enable GitHub code scanning before public release, or set ENABLE_GITHUB_CODE_SCANNING=true after enabling the feature."
      - name: Initialize CodeQL
        if: ${{ !github.event.repository.private || vars.ENABLE_GITHUB_CODE_SCANNING == 'true' }}
        uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3.28.0
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        if: ${{ !github.event.repository.private || vars.ENABLE_GITHUB_CODE_SCANNING == 'true' }}
        uses: github/codeql-action/autobuild@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3.28.0
      - name: Perform CodeQL analysis
        if: ${{ !github.event.repository.private || vars.ENABLE_GITHUB_CODE_SCANNING == 'true' }}
        uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3.28.0
        with:
          category: "/language:${{ matrix.language }}"
