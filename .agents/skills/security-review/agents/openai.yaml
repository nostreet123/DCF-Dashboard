interface:
  display_name: "Security Review"
  short_description: "Comprehensive security vulnerability review — injection, XSS, auth/authorization, secrets, and best practices"
  default_prompt: "Perform a comprehensive security review of the provided code. First, run scripts/quick_scan.py to surface high-signal hotspots — treat matches as leads, not confirmed findings; validate reachability and exploitability in the manual pass. Then identify entry points, trust boundaries, and sensitive data flows. Check all common vulnerabilities: injection (SQL/NoSQL/command), XSS, authentication/authorization flaws (IDOR, broken access control, missing tenant isolation), insecure data handling, hardcoded secrets. Verify security best practices: input validation, output encoding, secure defaults, safe error messages, safe logging with redaction. When relevant, check: SSRF, CSRF, path traversal, insecure CORS. Rate every finding by severity (Critical/High/Medium/Low) and confidence (High/Medium/Low). Report only findings with confidence >= Medium. Sort by severity descending. For each finding include: file:line, severity, confidence, description of impact and exploitability, evidence (endpoint/function + data flow to sink), recommended fix (specific, not vague), and suggested test. Never paste or echo secret values — report file location and type only. If no issues found, state so and summarize entry points and areas reviewed."
